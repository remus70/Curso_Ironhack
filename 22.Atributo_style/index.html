<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>Atributo style</title>
  </head>

  <body>
    <header>
      <h1>Ejercicio</h1>
    </header>

    <div class="d-grid gap-2 col-6 mx-auto">
      <button
        type="button"
        class="btn btn-outline-danger boton2"
        onclick="edad()"
      >
        Click
      </button>
    </div>

    <div class="container">
      <div id="div1">
        <img src="" alt="" />
        <p id="frase"></p>
      </div>
    </div>

    <div class="d-grid gap-2 col-6 mx-auto">
      <button
        type="button"
        class="btn btn-outline-primary boton2"
        onclick="descubrirMensaje()"
      >
        Descubre el mensaje!
      </button>
    </div>

    <div class="container">
      <div id="div2">
        <p class="secreto">Mensaje descubierto!</p>
      </div>
    </div>

    <div class="d-grid gap-2 col-6 mx-auto mt-4">
      <button class="btn btn-success" onclick="startAnim()">
        Mueve la pelota!
      </button>
      <button class="btn btn-warning" onclick="stopAnim()">
        Para la pelota!
      </button>
    </div>

    <div class="container">
      <div id="div3">
        <div class="pelota"></div>
      </div>
    </div>

    <script src="index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
