<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Cards + Positions</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="menu">
    <h3>Proyecto Cards + Positions</h3>
</nav>

<section class="cards-section">

    <h2 class="cards-title">Autores de fantasía</h2>

    <div class="cards-container">

        <div class="card">
            <img src="img/king.jfif" alt="Autor 1">
            <h3>Stephen King</h3>
        </div>

        <div class="card">
            <img src="img/brandom.webp" alt="Autor 2">
            <h3>Brandom Sanderson</h3>
        </div>

        <div class="card">
            <img src="img/martin.jpg" alt="Autor 3">
            <h3>J.R.R Martin</h3>
        </div>

        <div class="card">
            <img src="img/rowling.webp" alt="Autor 4">
            <h3>J.K.Rowling</h3>
        </div>

        <div class="card">
            <img src="img/tolkien.jpg" alt="Autor 5">
            <h3>J.R.R.Tolkien</h3>
        </div>

        <div class="card">
            <img src="img/rothfuss.jpg" alt="Autor 6">
            <h3>Patrick Rothfuss</h3>
        </div>

    </div>

</section>


<footer class="footer">
    <p>Mis autores de fantasía favoritos</p>
</footer>

</body>
</html>
