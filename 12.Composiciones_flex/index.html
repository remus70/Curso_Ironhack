<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Composiciones Flexbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <h1>Composiciones Flexbox</h1>
    <div class="comp1">
      <div class="colores">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
      </div>
    </div>

    <div class="comp2">
      <div class="fila">
        <div class="c1">1</div>
        <div class="c2">2</div>
        <div class="c3">3</div>
      </div>

      <div class="fila">
        <div class="c4">4</div>
        <div class="c5">5</div>
        <div class="c6">6</div>
      </div>

      <div class="fila">
        <div class="c7">7</div>
        <div class="c8">8</div>
        <div class="c9">9</div>
      </div>

      <div class="fila centro">
        <div class="c10">10</div>
      </div>
    </div>

    <div class="comp3">
      <div class="col"><div class="box c1">1</div></div>
      <div class="col"><div class="box c2">2</div></div>
      <div class="col"><div class="box c3">3</div></div>
      <div class="col"><div class="box c4">4</div></div>
      <div class="col"><div class="box c5">5</div></div>
      <div class="col"><div class="box c6">6</div></div>
      <div class="col"><div class="box c7">7</div></div>
      <div class="col"><div class="box c8">8</div></div>
      <div class="col"><div class="box c9">9</div></div>
      <div class="col"><div class="box c10">10</div></div>
    </div>
  </body>
</html>
